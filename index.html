<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Discord Bot Builder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-base: #0f172a;
            --bg-surface: #1e293b;
            --bg-surface-hover: #334155;
            --primary: #5865F2;
            --primary-hover: #4752C4;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --danger: #ef4444;
            --radius: 8px;
            --font-main: system-ui, -apple-system, sans-serif;
            --font-mono: 'Courier New', Courier, monospace;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-main);
            line-height: 1.5;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        /* Sidebar / Project Manager */
        .sidebar {
            width: 300px;
            background-color: var(--bg-surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1rem;
            overflow-y: auto;
        }
        .sidebar-header {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .project-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .project-item {
            background-color: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.75rem;
            cursor: pointer;
            transition: border-color 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .project-item:hover {
            border-color: var(--primary);
        }
        .project-info {
            overflow: hidden;
        }
        .project-title {
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .project-date {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .delete-btn {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            padding: 0.25rem;
            font-size: 1.2rem;
            opacity: 0.7;
        }
        .delete-btn:hover {
            opacity: 1;
        }
        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 2rem;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        .header {
            text-align: center;
            margin-bottom: 1rem;
        }
        .header h1 {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        /* Forms */
        .card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
        }
        input, textarea, select {
            background-color: var(--bg-base);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.75rem;
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
        }
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, opacity 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-outline {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
        }
        .btn-outline:hover:not(:disabled) {
            background-color: var(--bg-surface-hover);
            border-color: var(--text-muted);
        }
        /* Progress System */
        .progress-container {
            display: none;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1rem;
        }
        .progress-bar-bg {
            background-color: var(--bg-base);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            width: 100%;
        }
        .progress-bar-fill {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            transition: width 0.4s ease;
        }
        .steps {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .step {
            text-align: center;
            flex: 1;
            transition: color 0.3s;
        }
        .step.active {
            color: var(--primary);
            font-weight: 600;
        }
        .step.done {
            color: var(--success);
        }
        /* File Output */
        .output-section {
            display: none;
            flex-direction: column;
            gap: 1rem;
        }
        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .file-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        details {
            background-color: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        summary {
            padding: 1rem;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            background-color: var(--bg-surface);
        }
        summary:hover {
            background-color: var(--bg-surface-hover);
        }
        .summary-actions {
            display: flex;
            gap: 0.5rem;
        }
        .action-btn {
            background: var(--bg-base);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-btn:hover {
            color: var(--text-main);
            border-color: var(--text-main);
        }
        pre {
            background-color: #000;
            padding: 1rem;
            overflow-x: auto;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            color: #e2e8f0;
            margin: 0;
            border-top: 1px solid var(--border);
        }
        /* Responsive */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                overflow: auto;
            }
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border);
                max-height: 250px;
            }
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">Saved Projects</div>
        <ul class="project-list" id="projectList">
            </ul>
    </aside>
    <main class="main-content">
        <div class="container">
            
            <header class="header">
                <h1>AI Discord Bot Builder</h1>
                <p>Generate production-ready Discord bot structures in seconds.</p>
            </header>
            <section class="card">
                <form id="generateForm">
                    <div class="form-group">
                        <label for="prompt">Bot Description / Prompt</label>
                        <textarea id="prompt" placeholder="e.g. A moderation bot that kicks users for spamming and logs deleted messages..."></textarea>
                    </div>
                    <div class="grid-2">
                        <div class="form-group">
                            <label for="botType">Bot Type Architecture</label>
                            <select id="botType">
                                <option value="Moderation">Moderation</option>
                                <option value="Economy">Economy</option>
                                <option value="Music">Music</option>
                                <option value="Custom">Custom</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="clientId">Client ID (Optional)</label>
                            <input type="text" id="clientId" placeholder="123456789012345678">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="token">Bot Token (Used temporarily, never saved)</label>
                        <input type="password" id="token" placeholder="MTAx...">
                    </div>
                    <button type="submit" id="generateBtn" class="btn" style="margin-top: 1rem;">
                        Generate Bot Files
                    </button>
                </form>
                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="progressBar"></div>
                    </div>
                    <div class="steps">
                        <div class="step" id="step1">1. Structure</div>
                        <div class="step" id="step2">2. Files</div>
                        <div class="step" id="step3">3. Validating</div>
                        <div class="step" id="step4">4. Finalizing</div>
                    </div>
                </div>
            </section>
            <section class="card output-section" id="outputSection">
                <div class="output-header">
                    <h2>Generated Project</h2>
                    <div style="display: flex; gap: 0.5rem;">
                        <button class="btn btn-outline" id="clearBtn">Clear</button>
                        <button class="btn" id="downloadZipBtn">Download .ZIP</button>
                    </div>
                </div>
                <div class="file-list" id="fileList">
                    </div>
            </section>
        </div>
    </main>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // DOM Elements
            const form = document.getElementById('generateForm');
            const promptInput = document.getElementById('prompt');
            const tokenInput = document.getElementById('token');
            const clientIdInput = document.getElementById('clientId');
            const botTypeInput = document.getElementById('botType');
            const generateBtn = document.getElementById('generateBtn');
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const outputSection = document.getElementById('outputSection');
            const fileList = document.getElementById('fileList');
            const projectList = document.getElementById('projectList');
            const clearBtn = document.getElementById('clearBtn');
            const downloadZipBtn = document.getElementById('downloadZipBtn');
            // State
            let currentFiles = null;
            let currentProjectId = null;
            let currentStepInterval = null;
            // Initialize
            loadProjects();
            // Event Listeners
            form.addEventListener('submit', handleGenerate);
            clearBtn.addEventListener('click', clearOutput);
            downloadZipBtn.addEventListener('click', downloadZip);
            async function handleGenerate(e) {
                e.preventDefault();
                const prompt = promptInput.value.trim();
                const token = tokenInput.value.trim();
                const clientId = clientIdInput.value.trim();
                const type = botTypeInput.value;
                if (!prompt) {
                    alert("Please enter a bot description.");
                    return;
                }
                // UI Loading State
                generateBtn.disabled = true;
                generateBtn.textContent = "Generating...";
                outputSection.style.display = 'none';
                progressContainer.style.display = 'flex';
                
                // Simulate multi-step progress while waiting
                startProgressSimulation();
                try {
                    const response = await fetch('http://localhost:3000/generate-multistep', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt, token, clientId, type })
                    });
                    if (!response.ok) {
                        throw new Error(`API Error: ${response.status}`);
                    }
                    const data = await response.json();
                    
                    if (!data.files || typeof data.files !== 'object') {
                        throw new Error('Invalid JSON format received from API.');
                    }
                    finishProgressSimulation();
                    
                    // Small delay to allow progress bar to reach 100% visually
                    setTimeout(() => {
                        currentFiles = data.files;
                        currentProjectId = data.projectId || Date.now().toString();
                        
                        renderFiles(currentFiles);
                        saveProject(currentProjectId, prompt, currentFiles);
                        
                        progressContainer.style.display = 'none';
                        outputSection.style.display = 'flex';
                        resetBtn();
                    }, 500);
                } catch (error) {
                    console.error(error);
                    alert("Generation failed: " + error.message);
                    clearInterval(currentStepInterval);
                    progressContainer.style.display = 'none';
                    resetBtn();
                }
            }
            function startProgressSimulation() {
                let step = 1;
                updateStepUI(step);
                
                // Simulate step 1 to 3, leave step 4 for actual completion
                currentStepInterval = setInterval(() => {
                    if (step < 3) {
                        step++;
                        updateStepUI(step);
                    }
                }, 1500);
            }
            function finishProgressSimulation() {
                clearInterval(currentStepInterval);
                updateStepUI(4);
            }
            function updateStepUI(currentStep) {
                const percentages = { 1: 25, 2: 50, 3: 75, 4: 100 };
                progressBar.style.width = `${percentages[currentStep]}%`;
                for (let i = 1; i <= 4; i++) {
                    const stepEl = document.getElementById(`step${i}`);
                    if (i < currentStep) {
                        stepEl.className = 'step done';
                    } else if (i === currentStep) {
                        stepEl.className = 'step active';
                    } else {
                        stepEl.className = 'step';
                    }
                }
            }
            function resetBtn() {
                generateBtn.disabled = false;
                generateBtn.textContent = "Generate Bot Files";
            }
            function renderFiles(files) {
                fileList.innerHTML = '';
                const fragment = document.createDocumentFragment();
                for (const [filename, content] escaped of Object.entries(files)) {
                    const details = document.createElement('details');
                    details.open = filename === 'index.js' || filename === 'package.json'; // Auto open primary files
                    const summary = document.createElement('summary');
                    
                    const titleSpan = document.createElement('span');
                    titleSpan.textContent = `📄 ${filename}`;
                    
                    const actionsDiv = document.createElement('div');
                    actionsDiv.className = 'summary-actions';
                    
                    const copyBtn = document.createElement('button');
                    copyBtn.className = 'action-btn';
                    copyBtn.textContent = 'Copy';
                    copyBtn.onclick = (e) => {
                        e.preventDefault();
                        navigator.clipboard.writeText(content);
                        copyBtn.textContent = 'Copied!';
                        setTimeout(() => copyBtn.textContent = 'Copy', 2000);
                    };
                    const dlBtn = document.createElement('button');
                    dlBtn.className = 'action-btn';
                    dlBtn.textContent = 'DL';
                    dlBtn.onclick = (e) => {
                        e.preventDefault();
                        downloadSingleFile(filename, content);
                    };
                    actionsDiv.appendChild(copyBtn);
                    actionsDiv.appendChild(dlBtn);
                    
                    summary.appendChild(titleSpan);
                    summary.appendChild(actionsDiv);
                    
                    const pre = document.createElement('pre');
                    const code = document.createElement('code');
                    code.innerHTML = escapeHtml(content);
                    pre.appendChild(code);
                    details.appendChild(summary);
                    details.appendChild(pre);
                    fragment.appendChild(details);
                }
                fileList.appendChild(fragment);
            }
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            function saveProject(id, prompt, files) {
                const projects = getSavedProjects();
                
                // Avoid duplicates if reloading
                const existingIndex = projects.findIndex(p => p.id === id);
                const projectData = {
                    id,
                    prompt: prompt.substring(0, 50) + (prompt.length > 50 ? '...' : ''),
                    files,
                    createdAt: new Date().toISOString()
                };
                if (existingIndex >= 0) {
                    projects[existingIndex] = projectData;
                } else {
                    projects.unshift(projectData); // Add to top
                }
                localStorage.setItem('bot_projects', JSON.stringify(projects));
                loadProjects();
            }
            function getSavedProjects() {
                try {
                    return JSON.parse(localStorage.getItem('bot_projects')) || [];
                } catch {
                    return [];
                }
            }
            function loadProjects() {
                const projects = getSavedProjects();
                projectList.innerHTML = '';
                const fragment = document.createDocumentFragment();
                projects.forEach(proj => {
                    const li = document.createElement('li');
                    li.className = 'project-item';
                    
                    const infoDiv = document.createElement('div');
                    infoDiv.className = 'project-info';
                    infoDiv.onclick = () => loadSpecificProject(proj);
                    
                    const title = document.createElement('div');
                    title.className = 'project-title';
                    title.textContent = proj.prompt || 'Untitled Bot';
                    
                    const date = document.createElement('div');
                    date.className = 'project-date';
                    date.textContent = new Date(proj.createdAt).toLocaleDateString();
                    infoDiv.appendChild(title);
                    infoDiv.appendChild(date);
                    const delBtn = document.createElement('button');
                    delBtn.className = 'delete-btn';
                    delBtn.innerHTML = '×';
                    delBtn.title = 'Delete project';
                    delBtn.onclick = (e) => {
                        e.stopPropagation();
                        deleteProject(proj.id);
                    };
                    li.appendChild(infoDiv);
                    li.appendChild(delBtn);
                    fragment.appendChild(li);
                });
                projectList.appendChild(fragment);
            }
            function loadSpecificProject(project) {
                promptInput.value = project.prompt;
                currentFiles = project.files;
                currentProjectId = project.id;
                
                renderFiles(currentFiles);
                outputSection.style.display = 'flex';
                progressContainer.style.display = 'none';
            }
            function deleteProject(id) {
                if(confirm('Are you sure you want to delete this saved project?')) {
                    const projects = getSavedProjects().filter(p => p.id !== id);
                    localStorage.setItem('bot_projects', JSON.stringify(projects));
                    loadProjects();
                    if(currentProjectId === id) clearOutput();
                }
            }
            function clearOutput() {
                currentFiles = null;
                currentProjectId = null;
                outputSection.style.display = 'none';
                fileList.innerHTML = '';
                promptInput.value = '';
                // Intentionally leaving token and client ID intact for UX
            }
            async function downloadZip() {
                if (!currentFiles || !window.JSZip) return;
                
                const zip = new JSZip();
                for (const [filename, content] of Object.entries(currentFiles)) {
                    zip.file(filename, content);
                }
                try {
                    const content = await zip.generateAsync({ type: 'blob' });
                    const url = URL.createObjectURL(content);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `discord-bot-${currentProjectId || Date.now()}.zip`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                } catch (err) {
                    alert('Error generating ZIP file.');
                    console.error(err);
                }
            }
            function downloadSingleFile(filename, content) {
                const blob = new Blob([content], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }
        });
    </script>
</body>
</html>
